# Render Blueprint — after deploy, you MUST set MONGO_URI manually in the dashboard.
# Atlas → Network Access → allow 0.0.0.0/0
# See FIX_DATABASE.md for the full connection string format.

services:
  - type: web
    name: study-app-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # REQUIRED: paste your MongoDB Atlas URI in Render Dashboard → Environment
      # Example: mongodb+srv://user:pass@cluster0.xxx.mongodb.net/studyapp?retryWrites=true&w=majority
      - key: MONGO_URI
        sync: false
      - key: MONGO_URI_ATLAS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://study-app-liart.vercel.app
